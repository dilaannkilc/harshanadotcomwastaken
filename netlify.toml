[build]
  command = "npm run build"
  publish = "dist"
  functions = "api"

# Professional mode SPA redirect
[[redirects]]
  from = "/professional/*"
  to = "/professional/index.html"
  status = 200

# Creative mode SPA redirect
[[redirects]]
  from = "/creative/*"
  to = "/creative/index.html"
  status = 200

# Brutal mode SPA redirect
[[redirects]]
  from = "/brutal/*"
  to = "/brutal/index.html"
  status = 200

# API functions redirect
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://harshanajothiresume2026.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
